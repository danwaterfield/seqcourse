name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("TraMineR", "jsonlite"), repos="https://cloud.r-project.org")'
      - name: Generate TraMineR fixtures
        run: Rscript scripts/export_traminer_goldens.R
      - name: Upload TraMineR fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: traminer-reference-fixture
          path: tests/goldens/traminer_reference.json
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run parity tests
        run: pytest tests/test_parity_scaffolding.py
